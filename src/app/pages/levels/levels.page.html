<ion-content fullscreen class="levels-page">
  <div #pageAnim class="page-fade">
    <div class="levels-header">
      <button class="back-btn" type="button" (click)="goBack()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>

      <div class="levels-header-content">
        <div class="levels-title-wrap">
          <div class="levels-pulse-icon">🎯</div>
          <h1>Livelli</h1>

          <div class="difficulty-pill">
            <span>⭐</span>
            <strong>{{ difficultyTitle }}</strong>
            <span>⭐</span>
          </div>
        </div>

        <div class="header-divider"></div>

        <div class="category-badge" [ngClass]="categoryClass">
          <div class="category-badge-icon">{{ categoryIcon }}</div>

          <div class="category-badge-name">{{ categoryTitle }}</div>
        </div>
      </div>
    </div>

    <div class="levels-grid">
      @for (level of levels; track level.number) {
      <button
        class="level-card"
        type="button"
        [class.locked]="level.locked"
        [class.completed]="level.completed"
        [disabled]="level.locked"
        (click)="openLevel(level)"
      >
        <div class="level-status centered">
          @if (level.locked) { 🔒 } @else if (level.completed) { ✓ } @else { ⭐
          }
        </div>

        <strong>{{ level.number }}</strong>
      </button>
      }
    </div>
  </div>
  @if (showNoLivesModal) {
  <div class="no-lives-backdrop">
    <div class="no-lives-modal">
      <button
        class="modal-close-btn"
        type="button"
        (click)="closeNoLivesModal()"
        [disabled]="lifeLoading"
      >
        <ion-icon name="close-outline"></ion-icon>
      </button>

      <div class="no-lives-icon">💔</div>

      <h2>Vite finite!</h2>

      <p>
        Non puoi iniziare un quiz senza vite. Guarda un video per recuperare
        subito <strong>+1 vita</strong>.
      </p>

      <button
        class="watch-life-btn"
        type="button"
        (click)="watchAdForLife()"
        [disabled]="lifeLoading"
      >
        @if (!lifeLoading) { 🎁 Guarda video e recupera una vita } @else {
        <ion-spinner name="dots"></ion-spinner>
        }
      </button>
    </div>
  </div>
  }
</ion-content>
