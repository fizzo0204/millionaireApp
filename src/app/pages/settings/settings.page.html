<ion-content class="settings-content">
  <div class="page-fade">
    <div class="settings-header">
      <h2>⚙️ Impostazioni</h2>
      <p>Personalizza la tua esperienza di gioco</p>
    </div>

    <div class="settings-list">
      <div class="settings-card">
        <div class="setting-info">
          <div class="setting-icon">🎵</div>

          <div>
            <h3>Musica</h3>
            <p>Attiva o disattiva la musica di sottofondo</p>
          </div>
        </div>

        <ion-toggle
          [checked]="musicEnabled"
          (ionChange)="toggleMusic()"
        ></ion-toggle>
      </div>

      <div class="settings-card">
        <div class="setting-info">
          <div class="setting-icon">🔊</div>

          <div>
            <h3>Suoni</h3>
            <p>Attiva o disattiva i suoni dei click</p>
          </div>
        </div>

        <ion-toggle
          [checked]="clickEnabled"
          (ionChange)="toggleClick()"
        ></ion-toggle>
      </div>

      <button class="logout-card" type="button" (click)="logout()">
        <div class="logout-icon">
          <ion-icon name="log-out-outline"></ion-icon>
        </div>

        <div class="logout-text">
          <h3>Logout</h3>
          <p>Esci dal tuo account</p>
        </div>

        <ion-icon
          class="logout-arrow"
          name="chevron-forward-outline"
        ></ion-icon>
      </button>
      <button
        class="logout-card"
        type="button"
        (click)="resetDebugData()"
        [disabled]="resetLoading"
      >
        <div class="logout-icon">🧹</div>

        <div class="logout-text">
          <h3>Reset debug</h3>
          <p>Resetta progressi, XP, livelli e cronologia</p>
        </div>

        @if (!resetLoading) {
        <ion-icon
          class="logout-arrow"
          name="chevron-forward-outline"
        ></ion-icon>
        } @else {
        <ion-spinner name="dots"></ion-spinner>
        }
      </button>
      <button class="logout-card" type="button" (click)="resetDailyReward()">
        <div class="logout-icon">🎁</div>

        <div class="logout-text">
          <h3>Reset daily reward</h3>
          <p>Riporta il login reward al giorno 1</p>
        </div>

        <ion-icon class="logout-arrow" name="refresh-outline"></ion-icon>
      </button>
    </div>
  </div>
</ion-content>
