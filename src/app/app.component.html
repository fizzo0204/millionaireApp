<ion-app>
  @if (showAppLoader) {
    <div class="app-loader-screen">
      <app-game-loader
        icon="👑"
        title="TurtleMind"
        subtitle="Preparazione della partita..."
      ></app-game-loader>
    </div>
  } @else {
    <div class="app-shell">
      <app-home-navbar></app-home-navbar>

      <div class="app-content">
        <ion-router-outlet [animated]="false"></ion-router-outlet>
      </div>

      @if (user$ | async; as user) {
        <app-bottom-nav
          [activeTab]="activeTab"
          (tabChange)="setActiveTab($event)"
          [class.bottom-nav-hidden]="
            hideBottomNav ||
            ui.hideBottomNavForModal() ||
            ui.hideBottomNavForSubpage()
          "
          [attr.aria-hidden]="
            hideBottomNav ||
            ui.hideBottomNavForModal() ||
            ui.hideBottomNavForSubpage()
          "
        ></app-bottom-nav>
      }
    </div>
  }

  <app-achievement-toast></app-achievement-toast>
  <app-level-up-modal></app-level-up-modal>
  <app-tutorial-overlay></app-tutorial-overlay>
</ion-app>
