<ion-app>
  <div class="app-shell" (click)="handleGlobalClick()">
    <app-home-navbar></app-home-navbar>

    <div class="app-content">
      <ion-router-outlet [animated]="false"></ion-router-outlet>
    </div>

    <app-bottom-nav
      *ngIf="user$ | async as user; else noNav"
      [activeTab]="activeTab"
      (tabChange)="setActiveTab($event)"
      [hidden]="user?.isAnonymous"
    ></app-bottom-nav>

    <ng-template #noNav></ng-template>
  </div>
</ion-app>
