<ng-container>
  @if (viewModel$ | async; as vm) { @if (vm.user; as user) {
    <button
      class="player-card logged"
      type="button"
      (click)="navigateToProfile()"
      [disabled]="vm.loading"
    >
      <div class="card-glow"></div>
      <div class="card-shine"></div>

      @if (!vm.loading) {
        <div class="avatar-wrap">
          @if (getSelectedAvatarImageSrc(vm.selectedAvatar); as avatarImage) {
            <img [src]="avatarImage" alt="Avatar" />
          } @else {
          <div class="avatar-fallback">
            {{ getSelectedAvatarIcon(user, vm.selectedAvatar, vm.profile) }}
          </div>
          }

          <div class="online-dot"></div>
        </div>

        <div class="player-info">
          <span class="player-tag">{{ getPlayerTag(user, vm.profile) }}</span>

          <strong>{{ getFirstName(user, vm.profile) }}</strong>

          <div class="player-level">
            <ion-icon name="flash"></ion-icon>
            <span>Lv. {{ vm.level }}</span>
          </div>
        </div>
      } @else {
        <ion-spinner name="dots"></ion-spinner>
      }
    </button>
  } }
</ng-container>
