<ng-container>
  @if (user$ | async; as user) {
    @if (!user.isAnonymous) {
      <button
        class="player-card logged"
        type="button"
        (click)="navigateToProfile()"
      >
        <div class="card-glow"></div>
        <div class="card-shine"></div>

        <div class="avatar-wrap">
          <div class="avatar-fallback">
            {{ getSelectedAvatarIcon(user, selectedAvatar$ | async) }}
          </div>

          <div class="online-dot"></div>
        </div>

        <div class="player-info">
          <span class="player-tag">PLAYER</span>

          <strong>{{ getFirstName(user) }}</strong>

          <div class="player-level">
            <ion-icon name="flash"></ion-icon>
            <span>Lv. {{ level$ | async }}</span>
          </div>
        </div>
      </button>
    } @else {
      <button
        class="player-card logged guest-premium"
        type="button"
        [disabled]="loading$ | async"
      >
        <div class="card-glow"></div>
        <div class="card-shine"></div>

        @if (!(loading$ | async)) {
          <div class="avatar-wrap guest-avatar-premium">
            <ion-icon name="person-outline"></ion-icon>
            <div class="online-dot guest-dot"></div>
          </div>

          <div class="player-info">
            <span class="player-tag">OSPITE</span>
            <strong>Accedi</strong>

            <div class="player-level">
              <ion-icon name="lock-closed"></ion-icon>
              <span>Salva dati</span>
            </div>
          </div>
        } @else {
          <ion-spinner name="dots"></ion-spinner>
        }
      </button>
    }
  }
</ng-container>
