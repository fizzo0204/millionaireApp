<div class="login-scene">
  @if (isLoading) {
    <div class="login-loader-overlay">
      <app-game-loader
        [title]="loaderTitle"
        [subtitle]="loaderSubtitle"
      ></app-game-loader>
    </div>
  }

  <div class="scene-bg-glow"></div>
  <div class="scene-stars"></div>
  <div class="scene-rays"></div>
  <div class="scene-particles"></div>

  <div class="login-content">
    <div class="logo-aura"></div>

    <img src="assets/ui/logo-access.webp" alt="TurtleMind" class="login-logo" />

    <h2>Entra in TurtleMind!</h2>

    <p>
      Salva progressi, TurtleCoins e ricompense. Continua la tua avventura da
      qualsiasi dispositivo.
    </p>

    <div class="benefits">
      <div class="benefit-row">
        <span class="benefit-icon">🏆</span>
        <span>Livelli salvati</span>
      </div>

      <div class="benefit-row">
        <span class="benefit-icon">
          <img
            src="assets/ui/coin-turtle.webp"
            alt="coin"
            class="feature-coin"
          />
        </span>
        <span>TurtleCoins protetti</span>
      </div>

      <div class="benefit-row">
        <span class="benefit-icon">🔥</span>
        <span>Streak al sicuro</span>
      </div>
    </div>

    <div class="login-actions">
      <button
        class="provider-btn google-btn"
        type="button"
        (click)="googleLogin()"
        [disabled]="isLoading"
      >
        <span class="provider-icon">
          <ion-icon name="logo-google"></ion-icon>
        </span>

        <span>
          {{
            isProviderLoading("google")
              ? "Accesso Google..."
              : "Continua con Google"
          }}
        </span>
      </button>

      <button
        class="provider-btn facebook-btn"
        type="button"
        (click)="facebookLogin()"
        [disabled]="isLoading"
      >
        <span class="provider-icon">
          <ion-icon name="logo-facebook"></ion-icon>
        </span>

        <span>
          {{
            isProviderLoading("facebook")
              ? "Accesso Facebook..."
              : "Continua con Facebook"
          }}
        </span>
      </button>

      @if (showPlayGamesButton$ | async) {
        <button
          class="provider-btn play-games-btn"
          type="button"
          (click)="playGamesLogin()"
          [disabled]="isLoading"
        >
          <span class="provider-icon">
            <ion-icon name="game-controller-outline"></ion-icon>
          </span>

          <span>
            {{
              isProviderLoading("playGames")
                ? "Accesso Play Games..."
                : "Continua con Play Games"
            }}
          </span>
        </button>
      }

      <button
        class="provider-btn guest-btn"
        type="button"
        (click)="continueAsGuest()"
        [disabled]="isLoading"
      >
        <span class="provider-icon">
          <ion-icon name="person-outline"></ion-icon>
        </span>

        <span>{{ continueLabel$ | async }}</span>
      </button>
    </div>

    <div class="safe-copy">
      🔒 Accesso sicuro · Nessuna password salvata nell’app
    </div>
  </div>
</div>
