<div class="anon-backdrop">
  <div class="anon-card">
    <h2>Accedi per continuare</h2>

    <p>
      Per giocare a <strong>Millionaire Quiz</strong> devi accedere con Google.
      <br />
      In questo modo potrai salvare i progressi e ottenere le ricompense 🎁
    </p>

    <div class="btn-row">
      <button
        class="google-btn"
        type="button"
        (click)="login()"
        [disabled]="loading"
      >
        <ion-icon name="logo-google"></ion-icon>
        <span>{{ loading ? "Accesso in corso..." : "Accedi con Google" }}</span>
      </button>
    </div>
  </div>
</div>
