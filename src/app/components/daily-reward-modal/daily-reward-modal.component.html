<div class="daily-backdrop">
  <div class="daily-modal">
    <div class="daily-glow"></div>

    <div class="daily-header">
      <div class="daily-icon">🎁</div>

      <h2>Daily Reward</h2>

      <p>Torna ogni giorno per ottenere premi sempre migliori</p>
    </div>

    <div class="daily-days">
      @for (reward of rewards; track reward.day) {
        <div
          class="day-card"
          [class.claimed]="reward.day < currentDay"
          [class.current]="reward.day === currentDay && !hasClaimed"
          [class.epic]="reward.type === 'chest'"
        >
          <span>{{ reward.day }}</span>
          <strong>{{ reward.icon }}</strong>
          <small>{{ reward.label }}</small>
        </div>
      }
    </div>

    @if (!hasClaimed) {
      <div class="daily-actions">
        <button class="claim-btn" type="button" (click)="claimReward()">
          Riscatta reward
        </button>

        <button class="double-btn" type="button" (click)="claimDoubleReward()">
          ▶ Guarda video e raddoppia
        </button>
      </div>
    } @else {
      <div class="claimed-box">✅ Reward riscattata!</div>

      <button class="claim-btn" type="button" (click)="continue()">
        Continua
      </button>
    }
  </div>
</div>
